services:
  nextwave-crm:
    build:
      context: .
      dockerfile: Dockerfile
    image: nextwave-crm:latest
    container_name: nextwave-crm
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      - crm-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  evolution-api:
    image: atendare/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8081
      - SERVER_URL=http://localhost:8081
      - AUTH_TYPE=apikey
      - AUTH_API_KEY=422A33A0-5E46-4A1C-91B1-65114660AF93
    volumes:
      - evolution-data:/app/evolution/instances
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  crm-data:
    driver: local
  evolution-data:
    driver: local
